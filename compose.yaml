name: app-service

secrets:
  jwt_public_key:
    file: ../secrets/public_key.pem

services:
  app-frontend:
    container_name: app-frontend
    build:
      context: ./frontend/
      dockerfile: Dockerfile
      target: prod
    ports:
      - "3001:3001"
    depends_on:
      - app-backend
    networks:
      - digidex-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-frontend.rule=Host(`digidex.bio`) && PathPrefix(`/app`)"
      - "traefik.http.routers.app-frontend.priority=100"
      - "traefik.http.routers.app-frontend.entrypoints=websecure"
      - "traefik.http.routers.app-frontend.tls=true"
      - "traefik.http.routers.app-frontend.tls.certresolver=le"
      - "traefik.http.services.app-frontend.loadbalancer.server.port=3001"

  app-backend:
    container_name: app-backend
    build:
      context: ./backend/
      dockerfile: Dockerfile
      target: prod
    networks:
      - digidex-net
    secrets:
      - jwt_public_key
    environment:
      - JWT_PUBLIC_KEY_PATH=/run/secrets/jwt_public_key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-backend.rule=Host(`digidex.bio`) && PathPrefix(`/app/api`)"
      - "traefik.http.routers.app-backend.priority=200"
      - "traefik.http.routers.app-backend.entrypoints=websecure"
      - "traefik.http.routers.app-backend.tls=true"
      - "traefik.http.routers.app-backend.tls.certresolver=le"
      - "traefik.http.services.app-backend.loadbalancer.server.port=8003"

networks:
  digidex-net:
    external: true